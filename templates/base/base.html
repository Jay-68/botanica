<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Botanica{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/main.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">

<header class="site-header">
    <div class="header-inner">
        <a href="{% url 'home' %}" class="site-brand">
            <span class="brand-mark">✦</span>
            <span class="brand-name">Botanica</span>
        </a>
        <nav class="site-nav">
            <a href="{% url 'home' %}" class="nav-link">Home</a>
            <a href="{% url 'blog:post_list' %}" class="nav-link {% block nav_blog %}{% endblock %}">Journal</a>
            <a href="{% url 'grimoire:plant_list' %}" class="nav-link {% block nav_grimoire %}{% endblock %}">Grimoire</a>
        </nav>
        <button class="nav-toggle" aria-label="Menu">☰</button>
    </div>
</header>

<main class="site-main">
    {% block content %}{% endblock %}
</main>

<footer class="site-footer">
    <div class="footer-inner">
        <div class="footer-brand">
            <span class="brand-mark">✦</span>
            <span>Botanica</span>
        </div>
        <div class="footer-links">
            <a href="{% url 'blog:post_list' %}">Journal</a>
            <span class="sep">·</span>
            <a href="{% url 'grimoire:plant_list' %}">Grimoire</a>
            <span class="sep">·</span>
            <a href="{% url 'grimoire:random_plant' %}">Random Plant</a>
        </div>
        <p class="footer-note">A living archive of botanical knowledge.</p>
    </div>
</footer>

<script src="{% static 'js/main.js' %}"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
